<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satzbau-Baukasten: Моя квартира</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--primary);
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 { margin-bottom: 5px; font-size: 1.6rem; }
        .instruction { color: #7f8c8d; margin-bottom: 25px; font-style: italic; }

        /* Bereich für den fertigen Satz */
        .sentence-display {
            background: white;
            min-height: 100px;
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed var(--accent);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 10px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Wort-Kacheln */
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .word-tile {
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s;
            user-select: none;
        }

        .word-tile:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .word-tile.placed {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Buttons */
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        #check-btn { background: var(--success); color: white; }
        #clear-btn { background: #95a5a6; color: white; }
        #next-btn { background: var(--accent); color: white; display: none; }
        #restart-btn { background: var(--error); color: white; display: none; }

        #feedback {
            margin-top: 20px;
            height: 30px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #progress { margin-bottom: 15px; font-weight: bold; color: #b2bec3; }

        @media (max-width: 500px) {
            .word-tile { padding: 8px 14px; font-size: 1rem; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Составь предложение</h1>
    <p class="instruction">Bringe die Wörter in die richtige Reihenfolge.</p>
    
    <div id="progress">Satz 1 von 10</div>
    
    <div class="sentence-display" id="sentence-display">
        <!-- Hier erscheinen die gewählten Wörter -->
    </div>

    <div class="word-bank" id="word-bank">
        <!-- Hier liegen die verfügbaren Wörter -->
    </div>

    <div id="feedback"></div>

    <div class="controls">
        <button id="clear-btn">Löschen</button>
        <button id="check-btn">Prüfen</button>
        <button id="next-btn">Nächster Satz</button>
        <button id="restart-btn">Neustart</button>
    </div>
</div>

<script>
    const sentences = [
        "Я живу на восьмом этаже.",
        "В моей квартире одна комната.",
        "На кухне есть холодильник и плита.",
        "Я люблю смотреть фильмы в гостиной.",
        "Со мной живет моя собака.",
        "В коридоре висит большое зеркало.",
        "Мы переехали в эту квартиру летом.",
        "На столе стоят цветы в вазе.",
        "У меня нет телевизора в комнате.",
        "Моя квартира находится рядом с лесом."
    ];

    let currentIdx = 0;
    let userWords = [];
    let correctWords = [];

    const display = document.getElementById('sentence-display');
    const bank = document.getElementById('word-bank');
    const feedback = document.getElementById('feedback');
    const progress = document.getElementById('progress');
    const nextBtn = document.getElementById('next-btn');
    const checkBtn = document.getElementById('check-btn');
    const clearBtn = document.getElementById('clear-btn');
    const restartBtn = document.getElementById('restart-btn');

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU';
        const voices = window.speechSynthesis.getVoices();
        const maleVoice = voices.find(v => v.lang.includes('ru') && (v.name.includes('Male') || v.name.includes('Pavel')));
        if (maleVoice) msg.voice = maleVoice;
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    function initSentence() {
        display.innerHTML = '';
        bank.innerHTML = '';
        feedback.innerText = '';
        feedback.style.color = 'var(--primary)';
        nextBtn.style.display = 'none';
        checkBtn.style.display = 'inline-block';
        userWords = [];
        
        progress.innerText = `Satz ${currentIdx + 1} von ${sentences.length}`;
        
        let sentenceText = sentences[currentIdx];
        correctWords = sentenceText.split(' ');
        
        // Wörter mischen
        let shuffled = [...correctWords].sort(() => Math.random() - 0.5);
        
        shuffled.forEach((word, index) => {
            const tile = document.createElement('div');
            tile.className = 'word-tile';
            tile.innerText = word;
            tile.dataset.id = index;
            tile.onclick = () => moveWord(tile, word);
            bank.appendChild(tile);
        });
    }

    function moveWord(tile, word) {
        if (tile.parentElement === bank) {
            // Ins Display verschieben
            userWords.push({tile, word});
            display.appendChild(tile);
            tile.classList.add('placed');
        } else {
            // Zurück in die Bank
            userWords = userWords.filter(item => item.tile !== tile);
            bank.appendChild(tile);
            tile.classList.remove('placed');
        }
    }

    checkBtn.onclick = () => {
        let currentSentence = userWords.map(item => item.word).join(' ');
        if (currentSentence === sentences[currentIdx]) {
            feedback.innerText = "Правильно! ✓";
            feedback.style.color = "var(--success)";
            checkBtn.style.display = 'none';
            nextBtn.style.display = 'inline-block';
            speak(sentences[currentIdx]); // Ganzen Satz vorlesen
            if (currentIdx === sentences.length - 1) {
                nextBtn.style.display = 'none';
                restartBtn.style.display = 'inline-block';
                feedback.innerText = "Hervorragend! Alle Sätze sind fertig. 🎉";
            }
        } else {
            feedback.innerText = "Попробуй ещё раз (Versuch es nochmal)";
            feedback.style.color = "var(--error)";
        }
    };

    clearBtn.onclick = () => {
        userWords.forEach(item => {
            bank.appendChild(item.tile);
            item.tile.classList.remove('placed');
        });
        userWords = [];
        feedback.innerText = '';
    };

    nextBtn.onclick = () => {
        currentIdx++;
        initSentence();
    };

    restartBtn.onclick = () => {
        currentIdx = 0;
        restartBtn.style.display = 'none';
        initSentence();
    };

    // Chrome Stimmen laden
    window.speechSynthesis.onvoiceschanged = () => {};

    initSentence();
</script>

</body>
</html>
