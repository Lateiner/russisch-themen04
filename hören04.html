<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hörverstehen: Что ты слышишь?</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--primary);
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { margin-bottom: 10px; font-size: 1.6rem; }
        .instruction { color: #7f8c8d; margin-bottom: 30px; font-style: italic; }

        /* Audio Button */
        .audio-section {
            margin-bottom: 40px;
        }

        .play-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 15px rgba(52, 152, 219, 0.3);
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background: #2980b9;
        }

        .play-btn:active { transform: scale(0.95); }

        /* Antwort-Optionen */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-card {
            background: #f8f9fa;
            border: 3px solid #dfe6e9;
            border-radius: 15px;
            padding: 20px;
            font-size: 3.5rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
        }

        .option-card:hover:not(.disabled) {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .option-card.correct {
            background-color: var(--success);
            border-color: var(--success);
            color: white;
            transform: scale(1.05);
        }

        .option-card.wrong {
            background-color: var(--error);
            border-color: var(--error);
            color: white;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        #feedback {
            margin-top: 20px;
            height: 30px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #progress {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #b2bec3;
        }

        .restart-btn {
            display: none;
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
        }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
            .option-card { padding: 15px; font-size: 3rem; }
            .play-btn { width: 80px; height: 80px; font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Что ты слышишь?</h1>
    <p class="instruction">Klicke auf den Lautsprecher und wähle das richtige Bild aus.</p>
    
    <div id="game-ui">
        <div class="audio-section">
            <button class="play-btn" id="audio-btn" onclick="playCurrentWord()">🔊</button>
        </div>

        <div class="options-grid" id="options-grid">
            <!-- 3 Emojis werden hier geladen -->
        </div>

        <div id="feedback"></div>
        <div id="progress">Frage 1 von 10</div>
    </div>

    <button class="restart-btn" id="restart-btn" onclick="startGame()">Заново (Neustart)</button>
</div>

<script>
    const vocabulary = [
        { ru: "кухня", emoji: "🍳" },
        { ru: "холодильник", emoji: "🧊" },
        { ru: "плита", emoji: "🔥" },
        { ru: "спальня", emoji: "🛏️" },
        { ru: "кровать", emoji: "🛌" },
        { ru: "гостиная", emoji: "🛋️" },
        { ru: "телевизор", emoji: "📺" },
        { ru: "ванная", emoji: "🚿" },
        { ru: "стиральная машина", emoji: "🧼" },
        { ru: "коридор", emoji: "🧥" },
        { ru: "зеркаlo", emoji: "🪞" },
        { ru: "цветы", emoji: "🪴" },
        { ru: "окно", emoji: "🪟" },
        { ru: "ноутбук", emoji: "💻" }
    ];

    let currentIdx = 0;
    let gameItems = [];
    let canClick = true;

    // Männliche Stimme suchen
    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU';
        const voices = window.speechSynthesis.getVoices();
        const maleVoice = voices.find(v => v.lang.includes('ru') && (v.name.includes('Male') || v.name.includes('Pavel') || v.name.includes('Dmitry')));
        if (maleVoice) msg.voice = maleVoice;
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function startGame() {
        // 10 zufällige Begriffe auswählen
        gameItems = [...vocabulary].sort(() => Math.random() - 0.5).slice(0, 10);
        currentIdx = 0;
        document.getElementById('restart-btn').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        canClick = true;
        const currentItem = gameItems[currentIdx];
        document.getElementById('feedback').innerText = "";
        document.getElementById('progress').innerText = `Вопрос ${currentIdx + 1} из ${gameItems.length}`;
        
        // 2 falsche Distraktoren finden
        let distractors = vocabulary
            .filter(item => item.ru !== currentItem.ru)
            .sort(() => Math.random() - 0.5)
            .slice(0, 2);
        
        // Optionen mischen
        let options = [currentItem, ...distractors].sort(() => Math.random() - 0.5);
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.innerText = opt.emoji;
            card.onclick = () => checkAnswer(opt, card);
            grid.appendChild(card);
        });

        // Automatisch abspielen beim Laden
        setTimeout(() => playCurrentWord(), 500);
    }

    function playCurrentWord() {
        speak(gameItems[currentIdx].ru);
    }

    function checkAnswer(selectedItem, cardElement) {
        if (!canClick) return;
        
        const correctItem = gameItems[currentIdx];

        if (selectedItem.ru === correctItem.ru) {
            canClick = false;
            cardElement.classList.add('correct');
            document.getElementById('feedback').innerText = "Правильно! ✓";
            document.getElementById('feedback').style.color = "var(--success)";
            speak("Правильно");

            setTimeout(() => {
                currentIdx++;
                if (currentIdx < gameItems.length) {
                    loadQuestion();
                } else {
                    showEnd();
                }
            }, 1500);
        } else {
            cardElement.classList.add('wrong');
            document.getElementById('feedback').innerText = "Нет, попробуй ещё раз.";
            document.getElementById('feedback').style.color = "var(--error)";
            speak("Нет");
            setTimeout(() => cardElement.classList.remove('wrong'), 500);
        }
    }

    function showEnd() {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('restart-btn').style.display = 'inline-block';
        document.getElementById('feedback').innerText = "Поздравляю! Ты всё слышишь правильно. 🎉";
        document.getElementById('feedback').style.color = "var(--primary)";
    }

    // Chrome Sprach-Fix
    window.speechSynthesis.onvoiceschanged = () => {};

    startGame();
</script>

</body>
</html>
