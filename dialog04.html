<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диалог: В гостях у Иры</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #ecf0f1;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--primary);
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Gast-Bereich */
        .guest-area {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .guest-avatar {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .speech-bubble {
            position: relative;
            background: #f1f2f6;
            border-radius: 15px;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            line-height: 1.4;
            max-width: 80% ;
            margin-bottom: 20px;
            border: 2px solid #dfe4ea;
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 0;
            border: 15px solid transparent;
            border-top-color: #f1f2f6;
            border-bottom: 0;
            margin-left: -15px;
            margin-bottom: -15px;
        }

        /* Antwort-Optionen */
        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            background: white;
            border: 2px solid var(--accent);
            color: var(--primary);
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s;
            font-weight: 500;
        }

        .choice-btn:hover:not(.disabled) {
            background: var(--accent);
            color: white;
        }

        .choice-btn.correct {
            background: var(--success) !important;
            border-color: var(--success);
            color: white;
        }

        .choice-btn.wrong {
            background: var(--error) !important;
            border-color: var(--error);
            color: white;
        }

        #feedback {
            margin-top: 20px;
            font-weight: bold;
            height: 24px;
        }

        #progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.3s;
        }

        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-start {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .speech-bubble { font-size: 1rem; padding: 15px; }
            .choice-btn { font-size: 0.9rem; padding: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="game-container" style="display: none;">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        
        <div class="guest-area">
            <div class="guest-avatar">🤵‍♂️</div>
            <div class="speech-bubble" id="guest-question">...</div>
        </div>

        <div class="choices" id="choice-container">
            <!-- Buttons kommen per JS -->
        </div>

        <div id="feedback"></div>
    </div>

    <div id="start-screen" class="start-screen">
        <div class="guest-avatar">🏠</div>
        <h1>В гостях у Иры</h1>
        <p>Ein Gast besucht deine Wohnung. Antworte ihm höflich und logisch!</p>
        <button class="btn-start" onclick="startGame()">Начать (Start)</button>
    </div>
</div>

<script>
    const scenario = [
        {
            question: "Привет! Какая красивая квартира! Где она находится?",
            options: [
                "В Москве, на юге города.",
                "Нет, спасибо, я не хочу.",
                "Она находится в холодильнике."
            ],
            correct: 0,
            feedback: "Хорошее начало!"
        },
        {
            question: "Я хочу помыть руки. Где я могу это сделать?",
            options: [
                "В спальне на кровати.",
                "В ванной комнате, там есть раковина.",
                "В коридоре в шкафу."
            ],
            correct: 1,
            feedback: "Конечно, проходи в ванную."
        },
        {
            question: "Я очень хочу пить. Где у тебя кухня?",
            options: [
                "Кухня прямо здесь, это кухня-гостиная.",
                "Кухня находится в кладовке.",
                "Я не знаю, где кухня."
            ],
            correct: 0,
            feedback: "Отлично, давай выпьем кофе."
        },
        {
            question: "Ой, я устал. Где я могу немного отдохнуть?",
            options: [
                "Ты можешь сесть на плиту.",
                "Ты можешь лечь в ванну.",
                "Садись на диван в гостиной."
            ],
            correct: 2,
            feedback: "Пожалуйста, отдыхай."
        },
        {
            question: "У тебя очень много растений! Где они стоят?",
            options: [
                "Везде: на окне, на столе и на полках.",
                "Только под кроватью.",
                "Растения живут в стиральной машине."
            ],
            correct: 0,
            feedback: "Да, растения делают квартиру уютной."
        },
        {
            question: "Мне нужно поработать. Где стоит твой ноутбук?",
            options: [
                "В холодильнике.",
                "На письменном столе в спальне.",
                "В унитазе."
            ],
            correct: 1,
            feedback: "Работай на здоровье!"
        },
        {
            question: "Я слышу собаку! Где её место?",
            options: [
                "Она спит в духовке.",
                "Её место в спальне, рядом с кроватью.",
                "Собака живёт на балконе."
            ],
            correct: 1,
            feedback: "Она очень дружелюбная."
        },
        {
            question: "Спасибо за экскурсию! Мне пора идти. До свидания!",
            options: [
                "Пока! Твоя куртка в коридоре.",
                "Нет, у меня нет телевизора.",
                "В ванной есть мыло."
            ],
            correct: 0,
            feedback: "До встречи!"
        }
    ];

    let currentStep = 0;
    let canClick = true;

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU';
        const voices = window.speechSynthesis.getVoices();
        const maleVoice = voices.find(v => v.lang.includes('ru') && (v.name.includes('Male') || v.name.includes('Pavel') || v.name.includes('Dmitry')));
        if (maleVoice) msg.voice = maleVoice;
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        loadStep();
    }

    function loadStep() {
        canClick = true;
        const step = scenario[currentStep];
        document.getElementById('guest-question').innerText = step.question;
        document.getElementById('feedback').innerText = "";
        
        const container = document.getElementById('choice-container');
        container.innerHTML = "";
        
        step.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = opt;
            btn.onclick = () => handleChoice(idx, btn);
            container.appendChild(btn);
        });

        document.getElementById('progress-fill').style.width = `${(currentStep / scenario.length) * 100}%`;
        
        // Gast spricht
        setTimeout(() => speak(step.question), 300);
    }

    function handleChoice(idx, btn) {
        if (!canClick) return;
        const step = scenario[currentStep];
        
        if (idx === step.correct) {
            canClick = false;
            btn.classList.add('correct');
            document.getElementById('feedback').innerText = "Правильно! ✓";
            document.getElementById('feedback').style.color = "var(--success)";
            
            setTimeout(() => {
                currentStep++;
                if (currentStep < scenario.length) {
                    loadStep();
                } else {
                    showEnd();
                }
            }, 1800);
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').innerText = "Это нелогично. Попробуй ещё раз!";
            document.getElementById('feedback').style.color = "var(--error)";
            setTimeout(() => btn.classList.remove('wrong'), 800);
        }
    }

    function showEnd() {
        document.getElementById('game-container').style.display = 'none';
        const container = document.querySelector('.container');
        container.innerHTML = `
            <div class="guest-avatar">🎉</div>
            <h1>Молодец!</h1>
            <p>Du warst ein wunderbarer Gastgeber für den virtuellen Gast.</p>
            <button class="btn-start" onclick="location.reload()">Заново (Neustart)</button>
        `;
    }

    window.speechSynthesis.onvoiceschanged = () => {};
</script>

</body>
</html>
